<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booksky - Your Personal Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Icon Img.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">📚 Booksky</h1>
            <p class="tagline">Your Personal Library</p>
        </div>
    </header>

    <main class="main-content">
        <div class="contentbox-container" id="contentbox-container">
            <!-- Books will be dynamically inserted here -->
        </div>
    </main>

    <!-- Floating Action Button -->
    <button class="fab" id="popup-show-btn" title="Add a new book">
        <span class="plus-icon">+</span>
    </button>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="popup-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2>Add a New Book</h2>
                <button class="modal-close" id="cancel-btn" aria-label="Close modal">&times;</button>
            </div>
            
            <form class="book-form">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="book-title" 
                        class="form-input book-title" 
                        placeholder="Book Title"
                        required
                    >
                    <span class="form-label">Title</span>
                </div>

                <div class="form-group">
                    <input 
                        type="text" 
                        id="book-author" 
                        class="form-input book-author" 
                        placeholder="Author Name"
                        required
                    >
                    <span class="form-label">Author</span>
                </div>

                <div class="form-group">
                    <textarea 
                        id="short-description" 
                        class="form-textarea" 
                        placeholder="Add details about the book..."
                        rows="4"
                    ></textarea>
                    <span class="form-label">Description</span>
                </div>

                <div class="button-group">
                    <button type="submit" id="add-btn" class="btn btn-primary">Add Book</button>
                    <button type="button" id="cancel-btn-secondary" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
